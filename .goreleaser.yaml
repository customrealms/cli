# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: customrealms-cli

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    main: ./cmd
    binary: crx

checksum:
  name_template: "checksums.txt"
